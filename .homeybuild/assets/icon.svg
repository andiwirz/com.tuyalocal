<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Device body -->
  <rect x="20" y="15" width="60" height="70" rx="8" fill="#2196F3"/>
  <!-- Display panel -->
  <rect x="28" y="22" width="44" height="20" rx="4" fill="#E3F2FD"/>
  <!-- Humidity % text -->
  <text x="50" y="36" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1565C0">%RH</text>
  <!-- Vent slats -->
  <rect x="28" y="50" width="44" height="4" rx="2" fill="#BBDEFB"/>
  <rect x="28" y="58" width="44" height="4" rx="2" fill="#BBDEFB"/>
  <rect x="28" y="66" width="44" height="4" rx="2" fill="#BBDEFB"/>
  <!-- Water drop indicator -->
  <ellipse cx="50" cy="85" rx="6" ry="4" fill="#1565C0"/>
</svg>
