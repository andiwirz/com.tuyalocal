<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      padding: 24px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      margin: 0;
    }
    h2 { font-size: 20px; font-weight: 700; margin: 0 0 6px; }
    .subtitle { color: #666; margin: 0 0 16px; font-size: 13px; }

    .device-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border: 2px solid #1a73e8;
      border-radius: 10px;
      background: #f0f6ff;
      margin-bottom: 14px;
    }
    .device-icon { display: none; }
    .device-name { font-weight: 600; font-size: 15px; }
    .device-sub  { font-size: 12px; color: #555; margin-top: 2px; }

    .dp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 16px;
    }
    .dp-table th {
      text-align: left;
      color: #888;
      font-weight: 500;
      padding: 4px 6px;
      border-bottom: 1px solid #e8e8e8;
    }
    .dp-table td {
      padding: 5px 6px;
      border-bottom: 1px solid #f0f0f0;
    }
    .dp-badge {
      display: inline-block;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 4px;
      padding: 1px 6px;
      font-weight: 600;
      font-size: 12px;
    }
    .val-badge {
      display: inline-block;
      background: #f1f3f4;
      color: #333;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 12px;
      font-family: monospace;
    }
    .no-dp  { color: #aaa; font-style: italic; }
    .no-val { color: #ccc; }

    .status {
      margin-bottom: 12px;
      padding: 8px 10px;
      border-radius: 5px;
      font-size: 13px;
      display: none;
    }
    .status.error   { background: #fce8e6; color: #c5221f; display: block; }
    .status.success { background: #e6f4ea; color: #1e6a34; display: block; }

    .name-input-wrap {
      margin-bottom: 14px;
    }
    .name-input-wrap label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .name-input-wrap input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .name-input-wrap input:focus {
      outline: none;
      border-color: #1a73e8;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #loading { color: #888; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h2 id="page-title">Device found</h2>
  <p class="subtitle" id="page-subtitle">Ready to add.</p>

  <div id="loading">Loading device data…</div>

  <div id="device-card" class="device-card" style="display:none">
    <div class="device-icon" style="display:none"></div>
    <div>
      <div class="device-name" id="device-name">—</div>
      <div class="device-sub"  id="device-sub">—</div>
    </div>
  </div>

  <table class="dp-table" id="dp-table" style="display:none">
    <thead>
      <tr>
        <th id="th-function">Function</th>
        <th id="th-dp">DP</th>
        <th id="th-currentValue">Current value</th>
      </tr>
    </thead>
    <tbody id="dp-tbody">
    </tbody>
  </table>

  <div id="name-input-wrap" class="name-input-wrap" style="display:none">
    <label id="name-label">Device name</label>
    <input type="text" id="device-name-input" />
  </div>

  <div id="status" class="status"></div>
  <button id="addBtn" disabled>Add Device</button>

  <script>
    var pendingDevice = null;

    // Set all static UI text immediately – Homey.__() works before ready()
    // so we don't have to wait, avoiding the English-fallback flash.
    function initText() {
      document.getElementById('page-title').textContent      = Homey.__('pair.list_devices.title')        || 'Device found';
      document.getElementById('page-subtitle').textContent   = Homey.__('pair.list_devices.subtitle')     || 'Ready to add.';
      document.getElementById('loading').textContent         = Homey.__('pair.list_devices.loading')      || 'Loading device data…';
      document.getElementById('th-function').textContent     = Homey.__('pair.list_devices.function')     || 'Function';
      document.getElementById('th-dp').textContent           = Homey.__('pair.list_devices.dp')           || 'DP';
      document.getElementById('th-currentValue').textContent = Homey.__('pair.list_devices.currentValue') || 'Current value';
      document.getElementById('addBtn').textContent          = Homey.__('pair.list_devices.addBtn')       || 'Add Device';
      document.getElementById('name-label').textContent      = Homey.__('pair.list_devices.deviceName')   || 'Device name';
    }
    if (typeof Homey !== 'undefined') initText();

    function showStatus(msg, type) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    function dpBadge(n) {
      if (n == null || n === 0) return '<span class="no-dp">—</span>';
      return '<span class="dp-badge">DP ' + n + '</span>';
    }

    function valBadge(dps, dp) {
      if (!dp || dp === 0 || !(String(dp) in dps)) return '<span class="no-val">—</span>';
      return '<span class="val-badge">' + String(dps[String(dp)]) + '</span>';
    }

    // Fetch device list and raw DPS in parallel
    var devicesResult = null;
    var rawDpsResult  = {};
    var pending = 2;

    function onBothLoaded() {
      document.getElementById('loading').style.display = 'none';

      if (!devicesResult || devicesResult.length === 0) {
        showStatus(Homey.__('pair.list_devices.noDevice'), 'error');
        return;
      }

      pendingDevice = devicesResult[0];
      var s   = pendingDevice.settings || {};
      var dps = rawDpsResult;

      document.getElementById('device-name').textContent = pendingDevice.name || 'Dehumidifier';
      document.getElementById('device-sub').textContent  = s.ip || '';
      document.getElementById('device-card').style.display = 'flex';

      // Editable name field
      document.getElementById('device-name-input').value = pendingDevice.name || 'Dehumidifier';
      document.getElementById('name-input-wrap').style.display = 'block';
      document.getElementById('device-name-input').addEventListener('input', function() {
        document.getElementById('device-name').textContent = this.value || 'Dehumidifier';
      });

      var rowDefs = [
        ['onoff', s.dp_onoff,            Homey.__('pair.list_devices.onoff')],
        ['mode',  s.dp_mode,             Homey.__('pair.list_devices.mode')],
        ['lock',  s.dp_child_lock,       Homey.__('pair.list_devices.childLock')],
        ['timer', s.dp_countdown_timer,  Homey.__('pair.list_devices.timer')],
        ['left',  s.dp_countdown_left,   Homey.__('pair.list_devices.timerLeft')],
        ['fan',   s.dp_fan_speed,        Homey.__('pair.list_devices.fanSpeed')],
        ['cur',   s.dp_current_humidity, Homey.__('pair.list_devices.currentHumidity')],
        ['tgt',   s.dp_target_humidity,  Homey.__('pair.list_devices.targetHumidity')],
        ['water', s.dp_water_full,       Homey.__('pair.list_devices.waterFull')],
      ];

      var tbody = document.getElementById('dp-tbody');
      tbody.innerHTML = '';
      rowDefs.forEach(function(r) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + r[2] + '</td>' +
          '<td id="row-' + r[0] + '-dp">'  + dpBadge(r[1])       + '</td>' +
          '<td id="row-' + r[0] + '-val">' + valBadge(dps, r[1]) + '</td>';
        tbody.appendChild(tr);
      });

      document.getElementById('dp-table').style.display = 'table';
      document.getElementById('addBtn').disabled = false;
    }

    Homey.emit('list_devices', null, function(err, devices) {
      devicesResult = (!err && devices) ? devices : [];
      if (--pending === 0) onBothLoaded();
    });

    Homey.emit('raw_dps', null, function(err, dps) {
      rawDpsResult = (!err && dps) ? dps : {};
      if (--pending === 0) onBothLoaded();
    });

    document.getElementById('addBtn').addEventListener('click', function() {
      if (!pendingDevice) return;
      var btn = document.getElementById('addBtn');
      btn.disabled = true;
      btn.textContent = Homey.__('pair.list_devices.adding');

      var nameInput = document.getElementById('device-name-input').value.trim();
      if (nameInput) pendingDevice.name = nameInput;

      // Inform the driver about the chosen name, then create the device
      Homey.emit('set_device_name', pendingDevice.name, function() {});

      Homey.createDevice(pendingDevice)
        .then(function() {
          showStatus(Homey.__('pair.list_devices.added'), 'success');
          btn.textContent = '✓ ' + Homey.__('pair.list_devices.added');
          setTimeout(function() { Homey.done(); }, 1000);
        })
        .catch(function(err) {
          btn.disabled = false;
          btn.textContent = Homey.__('pair.list_devices.addBtn');
          showStatus(Homey.__('pair.list_devices.error') + (err.message || String(err)), 'error');
        });
    });

    if (typeof Homey !== 'undefined') {
      // Homey.ready() still needed to signal Homey the view is ready to show
      Homey.ready(function() {});
    }
  </script>
</body>
</html>
