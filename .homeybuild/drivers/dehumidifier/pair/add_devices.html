<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      padding: 24px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      text-align: center;
      color: #333;
    }
    #msg { margin-top: 12px; }
    .error { color: #c5221f; }
  </style>
</head>
<body>
  <div id="msg">Adding device…</div>

  <script>
    function fail(err) {
      document.getElementById('msg').className = 'error';
      document.getElementById('msg').textContent = 'Error: ' + ((err && err.message) || err || 'unknown');
    }

    // Step 1: register devices with the hub via list_devices
    Homey.emit('list_devices', null, function (err, devices) {
      if (err || !devices || devices.length === 0) {
        fail(err || 'No devices returned by list_devices');
        return;
      }

      // Step 2: create the registered devices
      Homey.emit('add_devices', devices, function (err2) {
        if (err2) {
          fail(err2);
          return;
        }
        document.getElementById('msg').textContent = '✓ Device added successfully.';
        setTimeout(function () { Homey.done(); }, 800);
      });
    });
  </script>
</body>
</html>
