<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Main chip body -->
  <rect x="20" y="20" width="60" height="60" rx="8" fill="currentColor" opacity="0.9"/>
  <!-- Inner die -->
  <rect x="30" y="30" width="40" height="40" rx="4" fill="currentColor" opacity="0.55"/>
  <!-- Core circle -->
  <circle cx="50" cy="50" r="10" fill="currentColor" opacity="0.75"/>
  <!-- Core dot -->
  <circle cx="50" cy="50" r="4" fill="currentColor" opacity="0.2"/>
  <!-- Left connector pins -->
  <rect x="10" y="34" width="10" height="4" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="10" y="44" width="10" height="4" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="10" y="54" width="10" height="4" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="10" y="62" width="10" height="4" rx="2" fill="currentColor" opacity="0.6"/>
  <!-- Right connector pins -->
  <rect x="80" y="34" width="10" height="4" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="80" y="44" width="10" height="4" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="80" y="54" width="10" height="4" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="80" y="62" width="10" height="4" rx="2" fill="currentColor" opacity="0.6"/>
  <!-- Top connector pins -->
  <rect x="34" y="10" width="4" height="10" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="44" y="10" width="4" height="10" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="54" y="10" width="4" height="10" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="62" y="10" width="4" height="10" rx="2" fill="currentColor" opacity="0.6"/>
  <!-- Bottom connector pins -->
  <rect x="34" y="80" width="4" height="10" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="44" y="80" width="4" height="10" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="54" y="80" width="4" height="10" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="62" y="80" width="4" height="10" rx="2" fill="currentColor" opacity="0.6"/>
</svg>
