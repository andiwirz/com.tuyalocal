name: New device support request
description: Request support for a Tuya device type not yet covered by a built-in driver
title: "[Device] "
labels: ["new-device"]
assignees:
  - andiwirz
body:

  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill this in! The more detail you provide, the faster support can be added.

        ---

        ### How to collect the required DP data

        You need the **current DP values** and the **DP type/range specifications** for your device.
        There are two ways to get them — use whichever is easier for you.

        ---

        #### Option A — Homey DP Debug panel *(fastest, no extra account needed)*

        1. Add your device to Homey as a **Generic Tuya Device** first.
        2. Open **Homey app → More → Apps → Tuya Local → Settings**.
        3. Go to **DP Debug** — select your device → screenshot the live DP value table.
        4. Go to **Raw Data** — select your device → copy the full JSON.

        Paste the Raw Data JSON into the *"Current DP values"* field below.
        The DP Debug screenshot goes into the *"Screenshots"* field.

        > **Note:** The DP Debug panel shows current live values but not data types or allowed ranges.
        > If you can also supply the API Explorer data (Option B), that gives us the full picture.

        ---

        #### Option B — Tuya IoT Platform API Explorer *(most complete, shows types & ranges)*

        **Prerequisites:** a free account at [iot.tuya.com](https://iot.tuya.com) with your device linked
        (via Smart Life / Tuya Smart app). See the [README](https://github.com/andiwirz/com.tuyalocal#how-to-get-device-id-and-local-key) for setup steps.

        **Open the API Explorer:**
        > Log in → left sidebar → **Cloud** → your project → **API Explorer**
        >
        > ⚠️ **Select the correct Data Centre** at the top-right of the API Explorer page.
        > It must match the region you used when creating your cloud project (e.g. Central Europe, Western America).
        > Wrong region = empty results.

        **Step 1 — Current DP values**
        > API Explorer → **Device Control** → **Query Properties**
        >
        > Enter your **Device ID** and click **Submit Request**.
        > Paste the full JSON response into the *"Step 1 — Current DP values"* field below.

        **Step 2 — DP types & allowed values**
        > API Explorer → **Device Control** → **Get the specifications and properties of the device**
        >
        > Enter your **Device ID** and click **Submit Request**.
        > Paste the full JSON response into the *"Step 2 — DP specifications"* field below.
        > This is the most important field — it shows exact data types, enum ranges, and integer min/max/step.

        > **Can't find "Device Control"?** The API Explorer layout was reorganised in 2024/2025.
        > Try using the **search box** at the top of the API Explorer page and search for
        > *"Query Properties"* or *"specifications"*. Alternatively, check under
        > **Devices Management → Query Device Details in Bulk** — this also returns the `local_key`.

        ---

  - type: input
    id: device_type
    attributes:
      label: Device type
      description: What kind of device is this?
      placeholder: "e.g. Robot Vacuum, Pool Pump, IR Blaster, Curtain Motor"
    validations:
      required: true

  - type: input
    id: manufacturer
    attributes:
      label: Manufacturer & model
      description: Brand name and model number if known
      placeholder: "e.g. Treatlife DS01 / Zemismart ZM25TQ"

  - type: dropdown
    id: tuya_app
    attributes:
      label: Tuya app used
      options:
        - Smart Life
        - Tuya Smart
        - Other
    validations:
      required: true

  - type: dropdown
    id: protocol
    attributes:
      label: Protocol version (if known)
      options:
        - Unknown / auto-detect
        - "3.3"
        - "3.4"
        - "3.1"
        - "3.5"
        - "3.22"
    validations:
      required: true

  - type: textarea
    id: raw_dps
    attributes:
      label: "Current DP values (Option A: Raw Data JSON — or — Option B: Query Properties response)"
      description: >
        Either paste the Raw Data JSON from Homey → Settings → DP Debug → Raw Data,
        or paste the full API response from Cloud → API Explorer → Device Control → Query Properties.
        Include every DP the device reports — even ones whose purpose is unclear.
      render: json
      placeholder: |
        {
          "result": [
            { "code": "switch",      "value": true   },
            { "code": "work_mode",   "value": "auto" },
            { "code": "temp_set",    "value": 22     },
            { "code": "temp_current","value": 21     }
          ],
          "success": true
        }
    validations:
      required: true

  - type: textarea
    id: dp_specifications
    attributes:
      label: "DP specifications — types & allowed values (Option B: API Explorer only)"
      description: >
        Paste the JSON response from
        Cloud → API Explorer → Device Control → Get the specifications and properties of the device.
        This tells us the exact data type and every allowed value for each DP
        (enum ranges, integer min/max/step/scale, etc.).
        Leave blank if you only have the Homey DP Debug data — we can work with that too.
      render: json
      placeholder: |
        {
          "result": {
            "functions": [
              {
                "code":   "switch",
                "dp_id":  1,
                "type":   "Boolean",
                "values": "{}"
              },
              {
                "code":   "work_mode",
                "dp_id":  2,
                "type":   "Enum",
                "values": "{\"range\":[\"auto\",\"manual\",\"sleep\",\"eco\"]}"
              },
              {
                "code":   "temp_set",
                "dp_id":  3,
                "type":   "Integer",
                "values": "{\"unit\":\"℃\",\"min\":16,\"max\":30,\"scale\":0,\"step\":1}"
              }
            ],
            "status": [
              {
                "code":   "fault",
                "dp_id":  13,
                "type":   "Bitmap",
                "values": "{\"label\":[\"lack_water\",\"overheat\"],\"maxlen\":2}"
              }
            ]
          },
          "success": true
        }

  - type: checkboxes
    id: capabilities
    attributes:
      label: Desired capabilities in Homey
      description: Check everything that should be controllable or visible in Homey.
      options:
        - label: On / Off
        - label: Mode picker
        - label: Target temperature / setpoint
        - label: Current temperature (sensor)
        - label: Target humidity / setpoint
        - label: Current humidity (sensor)
        - label: Fan speed
        - label: Brightness / dim
        - label: Color temperature
        - label: Color (HSV)
        - label: Timer / countdown
        - label: Child lock
        - label: Oscillation / swing
        - label: Fault alarm + push notification
        - label: Flow cards (triggers / conditions / actions)

  - type: textarea
    id: extra_capabilities
    attributes:
      label: Other capabilities
      description: Anything not covered by the checkboxes above?
      placeholder: "e.g. Battery level, Clean status, Error code picker"

  - type: textarea
    id: screenshot_device
    attributes:
      label: Screenshots — device tile and DP Debug panel
      description: >
        1. Screenshot of the device **tile / detail view** in Homey (after adding as Generic Tuya Device).
        2. Screenshot of **Settings → DP Debug** — the live DP value table for this device.
        3. Screenshot of **Settings → DP Debug → Raw Data** — full JSON payload.

        **Drag and drop all screenshots directly into this field.**
      placeholder: "Drag & drop screenshots here, or click to attach"

  - type: dropdown
    id: can_test
    attributes:
      label: Can you test a beta version?
      options:
        - "Yes — I can install and test on my Homey Pro"
        - "No"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to similar projects (e.g. tuya-local YAML), manufacturer spec sheets, anything else useful.
