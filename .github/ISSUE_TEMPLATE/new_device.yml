name: New device support request
description: Request support for a Tuya device type not yet covered by a built-in driver
title: "[Device] "
labels: ["new-device"]
assignees:
  - andiwirz
body:

  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill this in! The more detail you provide, the faster support can be added.

        ---

        ### How to collect the required DP data from iot.tuya.com

        You need **two API calls** from the Tuya IoT Platform. Both are found under
        **Cloud → API Explorer → Device Control**.

        #### Step 1 — Current DP values (Query Properties)

        > Cloud → API Explorer → Device Control → **Query Properties**

        Enter your **Device ID** and run the call. Paste the full JSON response into the
        *"Current DP values (Query Properties)"* field below.
        This shows every DP the device is currently reporting, with its live value.

        #### Step 2 — Data types and allowed values (Standard Instruction Set)

        > Cloud → API Explorer → Device Control (Standard Instruction Set) →
        > **Get the specifications and properties of the device**

        Enter your **Device ID** and run the call. Paste the full JSON response into the
        *"DP specifications (types & allowed values)"* field below.
        This gives you the data type (`Boolean`, `Integer`, `Enum`, …) and the full
        set of allowed values / range for every DP — essential for building pickers and sliders.

        ---

  - type: input
    id: device_type
    attributes:
      label: Device type
      description: What kind of device is this?
      placeholder: "e.g. Robot Vacuum, Pool Pump, IR Blaster, Curtain Motor"
    validations:
      required: true

  - type: input
    id: manufacturer
    attributes:
      label: Manufacturer & model
      description: Brand name and model number if known
      placeholder: "e.g. Treatlife DS01 / Zemismart ZM25TQ"

  - type: dropdown
    id: tuya_app
    attributes:
      label: Tuya app used
      options:
        - Smart Life
        - Tuya Smart
        - Other
    validations:
      required: true

  - type: dropdown
    id: protocol
    attributes:
      label: Protocol version (if known)
      options:
        - Unknown / auto-detect
        - "3.3"
        - "3.4"
        - "3.1"
        - "3.5"
    validations:
      required: true

  - type: textarea
    id: raw_dps
    attributes:
      label: "Step 1 — Current DP values (Query Properties)"
      description: >
        Paste the JSON response from
        Cloud → API Explorer → Device Control → Query Properties.
        Alternatively use Homey app → More → Apps → Tuya Local → Settings → DP Debug → Raw Data
        and copy the JSON for your device.
        Include every DP the device reports — even ones whose purpose is unclear.
      render: json
      placeholder: |
        {
          "result": [
            { "code": "switch",      "value": true   },
            { "code": "work_mode",   "value": "auto" },
            { "code": "temp_set",    "value": 22     },
            { "code": "temp_current","value": 21     }
          ],
          "success": true
        }
    validations:
      required: true

  - type: textarea
    id: dp_specifications
    attributes:
      label: "Step 2 — DP specifications (types & allowed values)"
      description: >
        Paste the JSON response from
        Cloud → API Explorer → Device Control (Standard Instruction Set) →
        Get the specifications and properties of the device.
        This is the most important field — it tells us the exact data type and every
        allowed value for each DP (enum ranges, integer min/max/step/scale, etc.).
      render: json
      placeholder: |
        {
          "result": {
            "functions": [
              {
                "code":   "switch",
                "dp_id":  1,
                "type":   "Boolean",
                "values": "{}"
              },
              {
                "code":   "work_mode",
                "dp_id":  2,
                "type":   "Enum",
                "values": "{\"range\":[\"auto\",\"manual\",\"sleep\",\"eco\"]}"
              },
              {
                "code":   "temp_set",
                "dp_id":  3,
                "type":   "Integer",
                "values": "{\"unit\":\"℃\",\"min\":16,\"max\":30,\"scale\":0,\"step\":1}"
              },
              {
                "code":   "temp_current",
                "dp_id":  4,
                "type":   "Integer",
                "values": "{\"unit\":\"℃\",\"min\":0,\"max\":50,\"scale\":0,\"step\":1}"
              }
            ],
            "status": [
              {
                "code":   "fault",
                "dp_id":  13,
                "type":   "Bitmap",
                "values": "{\"label\":[\"lack_water\",\"overheat\"],\"maxlen\":2}"
              }
            ]
          },
          "success": true
        }
    validations:
      required: true

  - type: checkboxes
    id: capabilities
    attributes:
      label: Desired capabilities in Homey
      description: Check everything that should be controllable or visible in Homey.
      options:
        - label: On / Off
        - label: Mode picker
        - label: Target temperature / setpoint
        - label: Current temperature (sensor)
        - label: Target humidity / setpoint
        - label: Current humidity (sensor)
        - label: Fan speed
        - label: Brightness / dim
        - label: Color temperature
        - label: Color (HSV)
        - label: Timer / countdown
        - label: Child lock
        - label: Oscillation / swing
        - label: Fault alarm + push notification
        - label: Flow cards (triggers / conditions / actions)

  - type: textarea
    id: extra_capabilities
    attributes:
      label: Other capabilities
      description: Anything not covered by the checkboxes above?
      placeholder: "e.g. Battery level, Clean status, Error code picker"

  - type: dropdown
    id: can_test
    attributes:
      label: Can you test a beta version?
      options:
        - "Yes — I can install and test on my Homey Pro"
        - "No"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links to similar projects, manufacturer spec sheets, anything else useful.
